services:
  server:
    build:
      context: ./server/Portfolio.Api
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: portfolio-server
    restart: unless-stopped
    environment:
      ConnectionStrings__Default: "Host=${POSTGRES_HOST};Port=5432;Database=${POSTGRES_DB:-portfolio};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Keycloak__Authority: ${KEYCLOAK_AUTHORITY}
      Keycloak__ClientId: ${KEYCLOAK_CLIENT_ID}
      Keycloak__ClientSecret: ${KEYCLOAK_CLIENT_SECRET}
      Keycloak__PublicOrigin: ${PUBLIC_ORIGIN}
      Keycloak__PostLoginPath: /admin
      Keycloak__PostLogoutPath: /admin/login
      ASPNETCORE_ENVIRONMENT: Production
      WebStatic__OutputPath: /app/web-static
      WebStatic__TemplatesPath: /app/Templates
    volumes:
      - uploads:/app/uploads
      - web_static:/app/web-static
    networks:
      - dokploy-network

  client:
    build:
      context: ./client
    container_name: portfolio-client
    restart: unless-stopped
    # No ports: on purpose. In production (Dokploy/Traefik) the reverse proxy
    # reaches this container over the internal docker network, so publishing
    # port 80 on the host would collide with Traefik. For local development
    # the override file re-adds a host binding.
    expose:
      - "80"
    depends_on:
      - server
    volumes:
      - web_static:/usr/share/nginx/html
    networks:
      - dokploy-network

volumes:
  uploads:
  web_static:

networks:
  dokploy-network:
    external: true

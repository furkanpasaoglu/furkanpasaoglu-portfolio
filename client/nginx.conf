server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allow CV uploads up to 10MB (server caps at 5MB, leave headroom)
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # ── Security headers ──────────────────────────────────────────────
    # HSTS: force HTTPS for 2 years, include subdomains, eligible for preload list
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Block MIME-type sniffing (stops browsers guessing content types)
    add_header X-Content-Type-Options "nosniff" always;
    # Control what Referer info leaks to third-party sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Disable powerful APIs we don't use
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    # Legacy click-jack protection (superseded by CSP frame-ancestors but still useful)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Hide upstream nginx version
    server_tokens off;

    # ── API reverse proxy ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://server:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ── Uploaded media (CV, future assets) ────────────────────────────
    location /media/ {
        proxy_pass http://server:8080/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_valid 200 1h;
    }

    # ── OpenAPI spec + Scalar docs UI (dev only on server) ────────────
    location /openapi/ {
        proxy_pass http://server:8080/openapi/;
        proxy_set_header Host $host;
    }
    location /scalar/ {
        proxy_pass http://server:8080/scalar/;
        proxy_set_header Host $host;
    }

    # ── Hashed static assets — long-term cache ────────────────────────
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
